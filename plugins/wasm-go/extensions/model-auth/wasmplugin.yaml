apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: model-auth.rise.io
  namespace: higress-system
  annotations:
    higress.io/wasm-plugin-description: 统一鉴权大模型调用，通过 API Key 和黑白名单控制访问，防止未授权请求，保障模型服务安全可控。
    higress.io/wasm-plugin-title: model-auth
  labels:
    higress.io/resource-definer: higress
    higress.io/wasm-plugin-built-in: "false"
    higress.io/wasm-plugin-category: custom
    higress.io/wasm-plugin-name: model-auth
    higress.io/wasm-plugin-version: 0.0.13
spec:
  defaultConfig:
    # ========================================
    # 必填配置项：模型映射配置
    # ========================================
    # model_mapping: 模型到租户的映射关系
    # 格式: 模型名称 -> 允许访问的租户列表
    # 如果租户列表包含 "*"，则所有用户都可以访问该模型
    # 如果租户列表为空数组，则没有任何用户可以访问该模型
    # 如果租户列表为字符串数组，则只有这些租户中的用户可以访问该模型
    # 请求示例: x-higress-llm-model: gen-studio-Qwen2.5-0.5B-Instruct-bbbb
    model_mapping:
      gen-studio-Qwen2.5-0.5B-Instruct-bbbb:
        - "*"

    # ========================================
    # 必填配置项：租户映射配置
    # ========================================
    # workspace_mapping: 租户到用户的映射关系
    # 格式: 租户名称 -> 该租户下的用户列表
    workspace_mapping:
      test-tenant:
        - "admin"
        - "weetime"

    # ========================================
    # 必填配置项：API Key 映射配置
    # ========================================
    # api_key_mapping: 用户到 API Key 列表的映射关系
    # 格式: 用户名 -> API Key 数组
    # 用户名会被设置到 x-api-key-name header 中，用于标识请求来源
    # 一个用户可以拥有多个 API Key
    api_key_mapping:
      admin:
        - "sk-xxx"
        - "sk-yyy"
      weetime:
        - "sk-zzz"
    # ========================================
    # 可选配置项：自定义请求头名称
    # ========================================
    # auth_header_name: 指定从哪个请求头读取 API Key
    #   - 默认值: "Authorization"
    #   - 如果使用 "Authorization"，需要 Bearer Token 格式: Authorization: Bearer sk-test
    #   - 如果使用自定义头（如 "X-API-Key"），直接使用值: X-API-Key: sk-test
    #
    # model_header_name: 指定从哪个请求头读取模型名称
    #   - 默认值: "x-higress-llm-model"
    #   - 请求示例: x-higress-llm-model: gen-studio-Qwen2.5-0.5B-Instruct-bbbb
    
    # 取消下面两行注释可以使用自定义请求头名称：
    # auth_header_name: "Authorization"
    # model_header_name: "x-higress-llm-model"
    
  matchRules:
  # - config:
  #     # Per-route configuration can override the default
  #     # 路由级别配置可以覆盖默认配置
  #     model_mapping:
  #       custom-model:
  #         - "custom-tenant"
  #     workspace_mapping:
  #       custom-tenant:
  #         - "custom-user"
  #     api_key_mapping:
  #       custom-user:
  #         - "sk-custom-key-1"
  #         - "sk-custom-key-2"
  #     # 也可以在路由级别自定义请求头名称
  #     # auth_header_name: "X-Route-API-Key"
  #     # model_header_name: "X-Route-Model"
  #   ingress:
  #   - ai-route-infer-8d9e797b-a180-4858-997e-c74857eb46df.internal
  defaultConfigDisable: false
  failStrategy: FAIL_CLOSE
  imagePullPolicy: UNSPECIFIED_POLICY
  phase: AUTHZ
  priority: 700
  # For local testing, use file:// URL
  # url: file:///opt/plugins/wasm-go/extensions/model-auth/plugin.wasm
  # For production, use OCI registry
  url: oci://quanzhenglong.com/camp/model-auth:v0.0.13

