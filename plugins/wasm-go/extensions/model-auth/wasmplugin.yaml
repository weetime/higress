apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: model-auth.rise.io
  namespace: higress-system
  annotations:
    higress.io/wasm-plugin-description: 统一鉴权大模型调用，通过 API Key 和黑白名单控制访问，防止未授权请求，保障模型服务安全可控。
    higress.io/wasm-plugin-title: model-auth
  labels:
    higress.io/resource-definer: higress
    higress.io/wasm-plugin-built-in: "false"
    higress.io/wasm-plugin-category: custom
    higress.io/wasm-plugin-name: model-auth
    higress.io/wasm-plugin-version: 0.0.10
spec:
  defaultConfig:
    # ========================================
    # 必填配置项
    # ========================================
    # api_key_models: 定义 API Key 到允许的模型列表的映射关系
    # 格式: api_key_models 是一个对象，每个键是 API Key，值包含 name（consumer 名称）和 models（允许访问的模型列表）
    # name 会被设置到 x-api-key-name header 中，用于标识请求来源
    api_key_models:
      sk-test:
        name: "test-consumer"
        models:
          - "gen-studio-Qwen2.5-0.5B-Instruct-bbbb"
      sk-weetime:
        name: "weetime/ai-for-deployer"
        models:
          - "gen-studio-Qwen2.5-0.5B-Instruct-bbbb"
          - "gen-studio-Qwen2.5-0.5B-Instruct-aaa"
      sk-audio:
        name: "audio-consumer"
        models:
          - "a1"
          - "a2"
    # ========================================
    # 可选配置项：模型白名单
    # ========================================
    # whitelist: 白名单中的模型无需认证，直接放行
    # 格式: 字符串数组，包含无需认证的模型名称
    whitelist:
      - "model-public"
      - "model-free"
    model_header_name: "x-higress-llm-model"
    auth_header_name: "x-api-key"
    # ========================================
    # 可选配置项：自定义请求头名称
    # ========================================
    # auth_header_name: 指定从哪个请求头读取 API Key（Bearer Token）
    #   - 默认值: "Authorization"
    #   - 如果不设置，将使用默认值 "Authorization"
    #   - 请求示例: Authorization: Bearer sk-test
    #
    # model_header_name: 指定从哪个请求头读取模型名称
    #   - 默认值: "x-higress-llm-model"
    #   - 如果不设置，将使用默认值 "x-higress-llm-model"
    #   - 请求示例: x-higress-llm-model: gen-studio-Qwen2.5-0.5B-Instruct-bbbb
    
    # 取消下面两行注释可以使用自定义请求头名称：
    # auth_header_name: "X-API-Key"
    # model_header_name: "X-Model-Name"
    
  matchRules:
  # - config:
  #     # Per-route configuration can override the default
  #     # 路由级别配置可以覆盖默认配置
  #     api_key_models:
  #       sk-custom:
  #         name: "custom-consumer"
  #         models:
  #           - "model-1"
  #           - "model-2"
  #     # 也可以在路由级别自定义请求头名称
  #     # auth_header_name: "X-Route-API-Key"
  #     # model_header_name: "X-Route-Model"
  #   ingress:
  #   - ai-route-infer-8d9e797b-a180-4858-997e-c74857eb46df.internal
  defaultConfigDisable: false
  failStrategy: FAIL_CLOSE
  imagePullPolicy: UNSPECIFIED_POLICY
  phase: AUTHZ
  priority: 700
  # For local testing, use file:// URL
  # url: file:///opt/plugins/wasm-go/extensions/model-auth/plugin.wasm
  # For production, use OCI registry
  url: oci://quanzhenglong.com/camp/model-auth:v0.0.10

