apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: ai-route-auth.rise.io
  namespace: higress-system
  annotations:
    higress.io/wasm-plugin-description: 基于 API Key 和租户的路由访问控制，通过 matchRules 配置不同路由的访问权限。
    higress.io/wasm-plugin-title: ai-route-auth
  labels:
    higress.io/resource-definer: higress
    higress.io/wasm-plugin-built-in: "false"
    higress.io/wasm-plugin-category: custom
    higress.io/wasm-plugin-name: ai-route-auth
    higress.io/wasm-plugin-version: 0.0.2
spec:
  defaultConfig:
    # ========================================
    # 必填配置项：租户用户映射配置
    # ========================================
    # workspace_users: 租户到用户的映射关系
    # 格式: 租户名称 -> 该租户下的用户列表
    workspace_users:
      ai-for-deployer:
        - admin
        - xiaoma
      tenant1:
        - admin
        - user1
      tenant2:
        - user2
        - user3

    # ========================================
    # 必填配置项：API Key 映射配置
    # ========================================
    # user_apikeys: 用户到 API Key 列表的映射关系
    # 格式: 用户名 -> API Key 数组
    # 用户名会被设置到 x-api-key-name header 中，用于标识请求来源
    # 一个用户可以拥有多个 API Key
    user_apikeys:
      admin:
        - "sk-aaa"
        - "ak-bbb"
      xiaoma:
        - "sk-ccc"
      user1:
        - "sk-ddd"
      user2:
        - "sk-eee"
      user3:
        - "sk-fff"

    # ========================================
    # 可选配置项：自定义请求头名称
    # ========================================
    # auth_header_name: 指定从哪个请求头读取 API Key
    #   - 默认值: "Authorization"
    #   - 如果使用 "Authorization"，需要 Bearer Token 格式: Authorization: Bearer sk-test
    #   - 如果使用自定义头（如 "X-Route-API-Key"），直接使用值: X-Route-API-Key: sk-test
    
    # 取消下面一行注释可以使用自定义请求头名称：
    # auth_header_name: "Authorization"

  matchRules:
    # ========================================
    # 路由规则配置
    # ========================================
    # 每个 matchRule 包含：
    #   - config: 路由级别的配置
    #     - rule_name: 规则名称（仅作为配置标识，插件逻辑中不使用）
    #     - allow_workspaces: 允许访问的租户列表
    #       - 如果包含 "*"，则所有用户都可以访问
    #       - 如果是具体租户数组，则只有这些租户中的用户可以访问
    #   - ingress: 匹配的 ingress 路由名称列表

    # 示例1：通配符模式（所有租户都可以访问）
    - config:
        rule_name: "infer-357cefd0-c54d-4d8b-9637-2beb7006c0e4"
        allow_workspaces:
          - "*"  # 所有租户都可以访问
      ingress:
        - ai-route-infer-8d9e797b-a180-4858-997e-c74857eb46df.internal

    # 示例2：租户列表模式（只有指定租户的用户可以访问）
    # - config:
    #     rule_name: "infer-357cefd0-c54d-4d8b-9637-2beb7006c0e4"
    #     allow_workspaces:
    #       - tenant1
    #       - tenant2
    #   ingress:
    #     - ai-route-infer-8d9e797b-a180-4858-997e-c74857eb46df.internal

  defaultConfigDisable: true
  failStrategy: FAIL_CLOSE
  imagePullPolicy: UNSPECIFIED_POLICY
  phase: AUTHZ
  priority: 700
  # For local testing, use file:// URL
  # url: file:///opt/plugins/wasm-go/extensions/ai-route-auth/plugin.wasm
  # For production, use OCI registry
  url: oci://quanzhenglong.com/camp/ai-route-auth:v0.0.2

